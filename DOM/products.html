<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> MotorShop SA</title>
    <link rel="stylesheet" href="css/styleProducts.css">

</head>

<body class="body">

    <header>
        <!-- Menu con hipervinculos del inicio / Productos / Agendar citas. -->
        <nav class="menu">
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="./products.html">Productos</a></li>
                <li><a href="#">Agendar citas</a></li>
            </ul>

            <nav id="nav-actions">
                <button class="btn" id="btn-show-login">Login Administrador</button>
                <button class="btn" id="btn-logout" class="hidden">Cerrar sesión</button>
            </nav>
        </nav>
    </header>

    <main>
        <!-- Ingreso de sesión -->
        <section id="login-section" class="hidden">
            <div class="card">
                <h2>Acceso administrador</h2>
                <input type="text" id="user-input" placeholder="Usuario">
                <input type="password" id="pass-input" placeholder="Contraseña">
                <button class="btn" id="btn-login">Ingresar</button>
                <p id="login-error" class="error hidden">Usuario o contraseña incorrecta</p>
            </div>
        </section>

        <section id="admin-section" class="hidden">
            <div class="card">
                <h2> Agregar repuestos o accesorios. </h2>

                <form id="product-form">
                    <input type="hidden" id="edit-index">
                    <input type="text" id="prod-img" placeholder="URL de la imagen (Ej: https://...)" required>
                    <input type="text" id="prod-name" placeholder="Nombre del producto" required>
                    <input type="text" id="prod-description" placeholder="Descripcion del producto" required>
                    <input type="number" id="prod-price" placeholder="Precio" required>
                    <input type="text" id="prod-descuent" placeholder="Cupon DESC50">

                    <button class="btn" type="submit" id="btn-save-product"> Guardar Producto </button>
                </form>
            </div>
        </section>

        <section id="store-section">
            <h2>Encuentra aqui nuestros mejores productos</h2>
            <div id="products-grid" class="grid-container">
            </div>
        </section>
    </main>


    <script src="js/script.js"></script>
</body>

<footer style="background:#111; padding:2.5rem 2rem 1.5rem;">
    <div class="container">

        <!-- Tagline opcional -->
        <p
            style="font-size:13px; color:#888; text-align:center; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:1.5rem;">
            Presentado Por: Maicol Steven Calderon Moreno
        </p>

        <!-- Íconos sociales -->
        <div style="display:flex; justify-content:center; gap:20px; margin-bottom:2rem;">
            <a href="https://facebook.com"
                style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);">
                <i class="fab fa-facebook-f" style="color:#bbb;"></i>
            </a>
            <a href="https://instagram.com"
                style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);">
                <i class="fab fa-instagram" style="color:#bbb;"></i>
            </a>
            <a href="https://linkedin.com"
                style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);">
                <i class="fab fa-linkedin-in" style="color:#bbb;"></i>
            </a>
            <a href="https://github.com"
                style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);">
                <i class="fab fa-github" style="color:#bbb;"></i>
            </a>
        </div>

        <!-- Línea divisoria -->
        <hr style="border:none;border-top:0.5px solid rgba(255,255,255,0.1);margin-bottom:1.25rem;">

        <!-- Copyright + links -->
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
            <span style="font-size:12px;color:#555;">© 2026 Tu Empresa. Todos los derechos reservados.</span>
            <div style="display:flex;gap:20px;">
                <a href="#" style="font-size:12px;color:#555;text-decoration:none;">Privacidad</a>
                <a href="#" style="font-size:12px;color:#555;text-decoration:none;">Términos</a>
                <a href="#" style="font-size:12px;color:#555;text-decoration:none;">Contacto</a>
            </div>
        </div>

    </div>
</footer>

</html>
